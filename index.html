<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" >
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="css/style.css" >
  </head>
  <body>
    <div class="container">
      <!-- Buttons for player moves -->
      <div id="buttons">
        <button id="play-rock" type="button">Rock</button>
        <button id="play-paper" type="button">Paper</button>
        <button id="play-scissors" type="button">Scissors</button>
      </div>

      <!-- Game messages -->
      <div id="messages"></div>

      <!-- Score result -->
      <div id="result">0 - 0</div>
    </div>

    <!-- Helper functions -->
    <script src="js/functions.js"></script>

    <!-- Main game script -->
    <script src="js/script.js"></script>
  </body>
</html>
